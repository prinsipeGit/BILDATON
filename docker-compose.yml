services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: luca
      POSTGRES_USER: luca
      POSTGRES_PASSWORD: luca
    ports:
      - "5432:5432"
    volumes:
      - luca_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luca -d luca"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - luca_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  luca_postgres:
  luca_redis:
